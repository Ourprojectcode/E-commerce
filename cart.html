<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart page</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <div class="cart">
        <h1>Shopping cart</h1>
        <table>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
            <tr>
                <td class="Product">
                    <img src="./Images/Kashmiri earrings.jpg" alt="" height="60px" width="100px">
                    <p> Kashmiri Earrings</p>
                    <p><button>Shop Now</button></p>

                </td>
                 <td>$18</td>
                <td>
                    <button>-</button>
                    <input type="text" value="1">
                    <button>+</button>
                </td>
                <td>$18</td>
                <td><img src="./Images/delete image.webp" alt="" height="25px" width="25px"><br><a href="#">Remove</a></td>
            </tr>
            <tr>
                <td class="Product">
                    <img src="./Images/Leather bag.webp" alt="" height="60px" width="100px">
                    <p>Leather bag</p>
                    <p><button>Shop Now</button></p>
                </td>
                <td>$54</td>
                <td>
                    <button>-</button>
                    <input type="text" value="1">
                    <button>+</button>
                </td>
                <td>$54</td>
                <td><img src="./Images/delete image.webp" alt="" height="25px" width="25px"><br><a href="#">Remove</a></td>
            </tr>
        </table>
        <div class="bottom">

            <div class="buttons">
                <button class="update-Cart"> Update cart</button><a href="#">Continue shopping</a>
            </div>


            <div class="summary">
                <h3>Order Summary</h3>

                <div class="row1">
                <p>Subtotal : $72.00</p>
                </div>

                <div class="row2">
                <p>Shipping : Free</p>
                </div>

                <p><button>You are eligible for free shipping</button></p>

                <div class="row-total">
                <h2>Total : $72</h2>
                </div>
                <button class="checkout"> Proceed to Checkout</button>

                <p>-->Continue Shopping</p>

            </div>
             

        </div>
             <footer class="footer">
                <p><---Continue Shopping</p>
            </footer>

    </div>

</body>
</html>
